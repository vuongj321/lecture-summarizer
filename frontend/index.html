<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Primary SEO ── -->
    <title>Monkey Mentor — AI Study Tool for College Students</title>
    <meta
      name="description"
      content="Upload your lecture PDFs and let AI generate summaries, flashcards, and practice quizzes instantly. Monkey Mentor helps college students study smarter and stress less."
    />
    <meta
      name="keywords"
      content="AI study tool, lecture summarizer, AI flashcards, college study app, AI tutor, study smarter, lecture notes AI, exam prep tool"
    />
    <meta name="author" content="Monkey Mentor" />
    <link rel="canonical" href="https://www.monkeymentor.app" />

    <!-- ── Open Graph (Facebook, LinkedIn, iMessage previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.monkeymentor.app" />
    <meta
      property="og:title"
      content="Monkey Mentor — AI Study Tool for College Students"
    />
    <meta
      property="og:description"
      content="Upload your lecture PDFs and let AI generate summaries, flashcards, and practice quizzes instantly. Study smarter, stress less."
    />
    <meta property="og:image" content="https://www.monkeymentor.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Monkey Mentor" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.monkeymentor.app" />
    <meta
      name="twitter:title"
      content="Monkey Mentor — AI Study Tool for College Students"
    />
    <meta
      name="twitter:description"
      content="Upload your lecture PDFs and let AI generate summaries, flashcards, and practice quizzes instantly."
    />
    <meta
      name="twitter:image"
      content="https://www.monkeymentor.app/og-image.png"
    />

    <!-- ── Indexing control ── -->
    <meta name="robots" content="index, follow" />

    <!-- ── Structured data (JSON-LD) ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Monkey Mentor",
        "url": "https://www.monkeymentor.app",
        "description": "AI-powered study tool that turns lecture PDFs into summaries, flashcards, and practice quizzes for college students.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "7",
            "priceCurrency": "USD",
            "billingIncrement": "P1M"
          }
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "124"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
